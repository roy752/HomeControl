name: Deploy HomeControl

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest -q

      - name: Deploy service
        shell: pwsh
        run: |
          ./deploy.ps1 -ServiceName HomeControl -Port 11090
